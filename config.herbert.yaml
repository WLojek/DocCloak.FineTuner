# DocCloak PII Detection — HerBERT Polish Fine-Tuning

# Model
base_models:
  - allegro/herbert-base-cased

# Dataset (local, generated by DataForge)
dataset: ./datasets/polish-pii
task: token-classification
text_column: tokens
label_column: ner_tags
eval_split: validation

# Agent
agent_model: claude-sonnet-4-6

# Optimization
metric: f1
metric_goal: maximize
sweep_epochs: 3
time_budget_per_run: 10h
device: auto

# Safeguards
max_runs: 20
max_no_improvement: 4
